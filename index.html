<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: #06070f;
    }

    a {
      color: #5fd8ea;
      text-decoration: none;
    }

    a:hover {
      color: #8be6f2;
    }

    ::selection {
      background: rgba(232, 200, 116, 0.3);
      color: #fff;
    }

    @keyframes glowPulse {

      0%,
      100% {
        opacity: .55;
      }

      50% {
        opacity: .9;
      }
    }

    @keyframes drift {
      0% {
        transform: translateY(0);
      }

      100% {
        transform: translateY(-14px);
      }
    }

    @media (max-width: 768px) {
      .container {
        padding-left: 20px !important;
        padding-right: 20px !important;
      }

      .grid-4 {
        grid-template-columns: 1fr 1fr !important;
      }

      .grid-3 {
        grid-template-columns: 1fr !important;
      }

      .grid-2 {
        grid-template-columns: 1fr !important;
      }

      .loop-col {
        border-right: none !important;
        border-bottom: 1px solid rgba(232, 200, 116, 0.16) !important;
        padding: 16px 0 !important;
      }

      .loop-col:last-child {
        border-bottom: none !important;
      }

      .table-wrapper {
        overflow-x: hidden !important;
      }

      .agent-roles-table thead {
        display: none;
      }

      .agent-roles-table tbody,
      .agent-roles-table tr,
      .agent-roles-table td {
        display: block;
        width: 100%;
        box-sizing: border-box;
      }

      .agent-roles-table tr {
        padding: 16px 0;
        border-top: 1px solid rgba(255, 255, 255, 0.06) !important;
      }

      .agent-roles-table tr:first-child {
        border-top: none !important;
      }

      .agent-roles-table td {
        border: none !important;
        padding: 6px 20px !important;
      }

      .agent-roles-table td:first-child {
        font-size: 16px;
        color: #e8c874 !important;
        padding-top: 0 !important;
      }

      .agent-roles-table td:last-child {
        padding-bottom: 0 !important;
      }
    }

    @media (max-width: 480px) {
      .grid-4 {
        grid-template-columns: 1fr !important;
      }
    }
  </style>
</head>

<body>

      </div>
      <div

          Empyrean<br />Rifts</h1>

    <!-- NAVBAR -->

      <!-- GDD Version Links -->
      <div class="container"

        <div style="display:flex; flex-direction:column; gap:8px;">
          <a href="v1.0.0.html"

            <div

              v1.0.0
            </div>
          </a>
          <a href="GDD-v1.0.0-review.html"
            style="font-family:'IBM Plex Mono',monospace; font-size:12px; color:#7d8098; align-self:flex-end; text-decoration:underline;">GDD
            v1.0.0 review</a>
        </div>

        <div
          style="display:flex; flex-direction:column; gap:8px; padding:16px 24px; background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.1); border-radius:4px; cursor:not-allowed; opacity:0.5;">
          <div
            style="font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color:#7d8098;">
            In Development</div>
          <div style="font-family:'Cinzel',serif; font-size:28px; font-weight:700; color:#7d8098; margin:0;">GDD v2.0
          </div>
        </div>
      </div>
    </nav>

    <footer class="container" style="border-top:1px solid rgba(232,200,116,0.16); padding:32px 48px;">
      <div
        style="max-width:600px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:#7d8098;">
        <span style="color:#e8c874;">Empyrean Rifts</span>
        <span style="color:#7d8098;">Astral Plane Gameplay Demo</span>
      </div>
    </footer>

  </div>
